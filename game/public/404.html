<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ArtLife</title>
    <script>
        // GitHub Pages SPA redirect — preserves the path for client-side routing.
        // When GitHub Pages can't find a file (e.g. /admin, /market, /inbox),
        // it serves this 404.html. We redirect to index.html with the path
        // encoded as a query parameter, then index.html restores it via pushState.
        var pathSegmentsToKeep = 1; // 1 for project pages (sabi-c.github.io/ArtLife-Game)
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>
</body>

</html>
