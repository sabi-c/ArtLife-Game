name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./game
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: './game/package-lock.json'

      - name: Install dependencies
        run: npm install --ignore-scripts
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Build
        run: npm run build

      # Safety check: verify critical assets before deploying
      - name: Pre-deploy Asset Validation
        run: |
          echo "=== Pre-deploy Validation ==="
          ERRORS=0

          # Check critical game assets
          for asset in content/maps/pallet_town.json assets/tilesets/world.png assets/tilesets/world2.png assets/tilesets/grounds.png assets/tilesets/grounds2.png assets/sprites/player.png; do
            if [ ! -f "dist/$asset" ]; then
              echo "FATAL: Missing dist/$asset"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check index.html
          if [ ! -f dist/index.html ]; then
            echo "FATAL: Missing dist/index.html"
            ERRORS=$((ERRORS + 1))
          fi

          # Check JS bundles exist
          JS_COUNT=$(ls dist/assets/*.js 2>/dev/null | wc -l)
          if [ "$JS_COUNT" -lt 2 ]; then
            echo "FATAL: Only $JS_COUNT JS bundles found (expected at least 2)"
            ERRORS=$((ERRORS + 1))
          fi

          # Check CSS exists
          CSS_COUNT=$(ls dist/assets/*.css 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -lt 1 ]; then
            echo "FATAL: No CSS bundles found"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "DEPLOYMENT BLOCKED: $ERRORS critical issue(s) found."
            echo "The build output is incomplete. This would break the live site."
            exit 1
          fi

          echo "All pre-deploy checks passed."
          echo "JS bundles: $JS_COUNT, CSS bundles: $CSS_COUNT"
          ls -la dist/assets/ | head -10

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./game/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
